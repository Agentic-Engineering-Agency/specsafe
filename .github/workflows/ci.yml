name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - name: Generator tests
        run: pnpm test -- --run

      - name: Content tests
        run: npx vitest run -c vitest.config.ts

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Get package info
        id: pkg
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on npm
        id: check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public
          rm -f .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION} — SpecSafe Skills-First TDD" \
            --notes "## @specsafe/cli v${VERSION}

          Skills-first TDD framework for AI-assisted development.

          ### Install

          \`\`\`bash
          npm install -g @specsafe/cli
          \`\`\`

          ### Quick Start

          \`\`\`bash
          specsafe init my-project
          specsafe install claude-code
          specsafe doctor
          \`\`\`

          ### Highlights

          - 12 canonical skills with 6 agent personas
          - 8 tool adapters (Claude Code, OpenCode, Cursor, Continue.dev, Aider, Zed, Gemini CLI, Google Antigravity)
          - Interactive CLI: init, install, update, doctor
          - 291 tests, 0 vulnerabilities

          **Full Changelog**: https://github.com/Agentic-Engineering-Agency/specsafe/compare/v0.8.0...v${VERSION}"
